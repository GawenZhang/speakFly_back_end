name: Deploy to Alibaba Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Django backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            echo "==> Enter project directory"
            cd /opt/speakfly/speakFly_back_end

            echo "==> Pull latest code"
            git pull origin main

            echo "==> Activate virtual environment"
            source /opt/speakfly/speakfly_env/bin/activate

            echo "==> Install dependencies"
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "==> Run database migrations"
            python manage.py migrate --noinput

            echo "==> Restart speakfly service"
            sudo systemctl restart speakfly

            echo "==> Check service status"
            sudo systemctl is-active --quiet speakfly
            echo "Deployment completed successfully."
